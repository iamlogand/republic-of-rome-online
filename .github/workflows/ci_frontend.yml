name: Build and test frontend

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  ci_frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache

      - name: Install Dependencies
        run: cd frontend && npm ci

      - name: Build Next.js
        run: cd frontend && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start backend
        run: docker compose -f backend/docker-compose.test.yml up -d --build

      - name: Wait for backend to be ready
        run: timeout 120 bash -c 'until curl -sf http://127.0.0.1:8000/api/ > /dev/null; do sleep 3; done'

      - name: Start Next.js dev server
        run: cd frontend && npm run dev > /tmp/nextjs.log 2>&1 &

      - name: Wait for Next.js to be ready
        run: timeout 60 bash -c 'until curl -sf http://127.0.0.1:3000 > /dev/null; do sleep 2; done'

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run tests
        run: cd frontend && npm run test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop backend
        if: always()
        run: docker compose -f backend/docker-compose.test.yml down
